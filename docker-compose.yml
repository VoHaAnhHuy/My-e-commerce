version: '3.8'

services:
  # PHP-FPM Container
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ecommerce_php
    volumes:
      - ./backend:/var/www/backend
    networks:
      - app-network

  # Nginx Web Server
  web:
    image: nginx:alpine
    container_name: ecommerce_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: ecommerce_db
    environment:
      MYSQL_DATABASE: ecommerce_db
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

  # Node Container (Cho Frontend Vite)
  frontend:
    image: node:20-alpine
    container_name: ecommerce_frontend
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "5173:5173"
    # Tự động cài package và chạy Vite khi khởi động
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - app-network

  # phpMyAdmin Container
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ecommerce_phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data: